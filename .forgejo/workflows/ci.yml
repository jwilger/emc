# Copyright 2026 John Wilger

name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare-nix:
    name: Prepare Nix cache
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Show Nix version
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix --version

  copyright-headers:
    name: Copyright headers
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run copyright header check
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just copyright-headers

  fmt:
    name: Format check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run format check
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just fmt

  clippy:
    name: Clippy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run clippy
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just clippy

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run tests
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just test

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run build
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix develop --command just build

  flake-check:
    name: Nix flake check
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: [prepare-nix]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install or reuse Nix
        run: ./.forgejo/scripts/install-nix.sh

      - name: Run flake check
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          nix flake check --print-build-logs
