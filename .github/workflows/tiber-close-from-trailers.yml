name: tiber close from trailers

on:
  push:
    branches: [main]

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tiber
        run: |
          git clone --depth 1 https://github.com/jwilger/ai-plugins.git .tiber-src
          cargo install --path .tiber-src/plugins/tiber/rust/crates/tiber-cli --bin tiber --root .tiber-install
          echo "$PWD/.tiber-install/bin" >> "$GITHUB_PATH"
      - run: tiber close-from-trailers
