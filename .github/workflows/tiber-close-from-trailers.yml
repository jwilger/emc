name: tiber close from trailers

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Load signing key
        id: load_secrets
        uses: 1password/load-secrets-action@v4
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RELEASE_SIGNING_KEY: op://Github Secrets/RELEASE_SIGNING_KEY/private key?ssh-format=openssh

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install Tiber
        run: |
          git clone https://github.com/jwilger/ai-plugins.git .tiber-src
          git -C .tiber-src checkout 52844ac3ce4b8f1e7e1758d6631d86101ffc08e6
          cargo install --locked --path .tiber-src/plugins/tiber/rust/crates/tiber-cli --bin tiber --root .tiber-install
          echo "$PWD/.tiber-install/bin" >> "$GITHUB_PATH"

      - name: Configure signed task updates
        env:
          RELEASE_SIGNING_KEY: ${{ steps.load_secrets.outputs.RELEASE_SIGNING_KEY }}
          RELEASE_SIGNING_NAME: ${{ vars.RELEASE_SIGNING_NAME }}
          RELEASE_SIGNING_EMAIL: ${{ vars.RELEASE_SIGNING_EMAIL }}
        run: ./.github/scripts/configure-release-plz-git-signing.sh

      - run: tiber close-from-trailers
