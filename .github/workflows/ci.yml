name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  strict-rust-gate:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: -Dwarnings
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v16

      - name: Run local CI gate
        run: nix develop --command just ci
